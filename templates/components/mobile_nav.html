<div id="mobile-nav-overlay" class="hidden fixed inset-0 bg-black/50 z-[60] lg:hidden" aria-hidden="true"></div>

<nav id="mobile-nav-menu"
     class="fixed top-0 right-0 h-full w-[min(100%,320px)] z-[70] translate-x-full transition-transform duration-300 ease-out lg:hidden
            bg-white border-l border-gray-200 shadow-2xl
            dark:bg-cardbg-dark dark:border-white/10"
     aria-label="Мобильное меню">
    <div class="flex items-center justify-between p-4 border-b border-gray-200 dark:border-white/10">
        <span class="font-bold text-lg text-gray-900 dark:text-white">Меню</span>
        <button id="mobile-nav-close" type="button" aria-label="Закрыть меню"
                class="p-2 rounded-lg text-gray-600 hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-white/10">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </button>
    </div>
    <div class="flex flex-col gap-1 p-4">
        {% for link in nav_links %}
        <a href="{{ link.href }}"
           class="px-4 py-3 rounded-xl text-base font-semibold text-gray-700 hover:bg-purple-50 hover:text-purple-700
                  dark:text-gray-300 dark:hover:bg-white/5 dark:hover:text-purple-400 transition-colors">
            {{ link.label }}
        </a>
        {% endfor %}
        <button type="button" data-track-cta="Личный кабинет"
                class="mt-4 btn-gradient w-full py-3 rounded-xl text-sm">
            Личный кабинет
        </button>
    </div>
</nav>
