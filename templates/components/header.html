{% load static %}
<header class="sticky top-0 z-50 border-b backdrop-blur-xl
               border-gray-200/60 bg-white/80 shadow-sm
               dark:border-purple-400/15 dark:bg-darkbg/85 dark:shadow-none">
    <nav class="section-container py-3 sm:py-4 flex items-center justify-between gap-4">
        <a href="{% url 'landing:index' %}" class="flex items-center gap-2 sm:gap-3 shrink-0">
            <img src="{% static 'images/logo.png' %}"
                 alt="Логотип {{ site_name }}"
                 class="w-10 h-10 sm:w-12 sm:h-12 object-contain rounded-xl"
                 width="48" height="48">
            <div>
                <span class="font-bold text-lg sm:text-xl tracking-wide block leading-none text-gray-900 dark:text-white">Наследие</span>
                <span class="text-[9px] sm:text-[10px] text-purple-600 dark:text-purple-300 uppercase tracking-widest font-bold dark:font-semibold">Образовательный центр</span>
            </div>
        </a>

        <div class="hidden lg:flex items-center gap-6 xl:gap-8 text-sm font-semibold text-gray-600 dark:text-gray-300 dark:font-medium">
            {% for link in nav_links %}
            <a href="{{ link.href }}" class="hover:text-purple-600 dark:hover:text-purple-400 transition-colors whitespace-nowrap">{{ link.label }}</a>
            {% endfor %}
        </div>

        <div class="flex items-center gap-2 sm:gap-3">
            {% include "components/theme_toggle.html" %}

            <a href="https://www.naslediye-dnevnik.ru" target="_blank" rel="noopener noreferrer"
               data-track-cta="Личный кабинет"
               class="hidden xs:inline-flex btn-gradient px-4 sm:px-6 py-2 sm:py-2.5 rounded-full text-xs sm:text-sm">
                <span class="hidden sm:inline">Личный кабинет</span>
                <span class="sm:hidden">Кабинет</span>
            </a>

            <button id="mobile-nav-toggle" type="button" aria-expanded="false" aria-controls="mobile-nav-menu"
                    class="lg:hidden p-2 rounded-lg text-gray-600 hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-white/10">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>
        </div>
    </nav>
</header>
