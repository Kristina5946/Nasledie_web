{% load static cropping %}
<section id="teachers" class="py-16 sm:py-20 relative z-10 overflow-hidden dark-tone-raised
    bg-gray-800 text-white">
    <div class="absolute top-0 right-0 w-[400px] sm:w-[800px] h-[400px] sm:h-[800px] bg-purple-600/20 rounded-full blur-[120px] -translate-y-1/2 translate-x-1/3
                dark:left-0 dark:right-auto dark:-translate-x-1/3 dark:bg-purple-500/15"></div>

    <div class="section-container relative z-10">
        <div class="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-4 mb-8 sm:mb-12">
            <div class="text-center sm:text-left">
                <h2 class="text-2xl sm:text-3xl md:text-4xl font-bold mb-2 sm:mb-3">Наши педагоги</h2>
                <p class="text-gray-400 text-base sm:text-lg max-w-2xl">
                    Команда профессионалов, влюбленных в свое дело. Они не просто преподают, они вдохновляют.
                </p>
            </div>
            <div class="hidden sm:flex items-center gap-2 shrink-0">
                <button type="button" id="teachers-prev" aria-label="Предыдущий педагог" class="teachers-slider__btn">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <button type="button" id="teachers-next" aria-label="Следующий педагог" class="teachers-slider__btn">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                </button>
            </div>
        </div>

        <div class="teachers-slider">
            <div class="teachers-slider__viewport" id="teachers-viewport">
                <div class="teachers-slider__track" id="teachers-track">
                    {% for teacher in teachers %}
                    <article class="teachers-slider__slide">
                        <div class="bg-white/5 border border-white/10 p-5 sm:p-6 rounded-3xl h-full text-center group
                                    dark:bg-cardbg-dark/80 dark:border-purple-400/15 dark:hover:bg-cardbg-dark transition-colors">
                            <img src="{% cropped_thumbnail teacher "avatar_cropping" %}" alt="{{ teacher.name }}"
                                 class="w-28 h-28 sm:w-32 sm:h-32 md:w-36 md:h-36 mx-auto rounded-full object-cover mb-4 border-4 transition-colors
                                 {% if teacher.color == 'purple' %}border-purple-500/30 group-hover:border-purple-500
                                 {% elif teacher.color == 'blue' %}border-blue-500/30 group-hover:border-blue-500
                                 {% elif teacher.color == 'fuchsia' %}border-fuchsia-500/30 group-hover:border-fuchsia-500
                                 {% elif teacher.color == 'indigo' %}border-indigo-500/30 group-hover:border-indigo-500
                                 {% else %}border-green-500/30 group-hover:border-green-500{% endif %}"
                                 loading="lazy">
                            <h3 class="text-base sm:text-lg font-bold mb-1 leading-snug">{{ teacher.name }}</h3>
                            <p class="text-xs sm:text-sm mb-3 leading-relaxed
                                {% if teacher.color == 'purple' %}text-purple-400
                                {% elif teacher.color == 'blue' %}text-blue-400
                                {% elif teacher.color == 'fuchsia' %}text-fuchsia-400
                                {% elif teacher.color == 'indigo' %}text-indigo-400
                                {% else %}text-green-400{% endif %}">{{ teacher.role }}</p>
                            <p class="text-gray-400 text-sm leading-relaxed">{{ teacher.description }}</p>
                        </div>
                    </article>
                    {% endfor %}
                </div>
            </div>
            <div class="flex sm:hidden items-center justify-center gap-3 mt-5">
                <button type="button" id="teachers-prev-mobile" aria-label="Предыдущий" class="teachers-slider__btn">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <div id="teachers-dots" class="flex items-center gap-2"></div>
                <button type="button" id="teachers-next-mobile" aria-label="Следующий" class="teachers-slider__btn">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                </button>
            </div>
        </div>
    </div>
</section>
