<section class="section-container pt-12 sm:pt-16 lg:pt-20 pb-16 sm:pb-20 lg:pb-24 relative z-10">
    <div class="grid lg:grid-cols-2 gap-8 lg:gap-12 items-center">
        <div class="text-left">
            <div class="inline-flex items-center gap-2 px-4 sm:px-5 py-2 rounded-full text-sm font-semibold mb-5 sm:mb-6 shadow-sm
                        bg-purple-50 border border-purple-200 text-purple-700
                        dark:bg-purple-900/40 dark:border-purple-500/50 dark:text-purple-200 dark:font-medium dark:shadow-none dark:backdrop-blur-sm">
                <span class="w-2 h-2 rounded-full bg-green-500 dark:bg-green-400 animate-pulse"></span>

            </div>

            <h1 class="text-3xl xs:text-4xl sm:text-5xl md:text-6xl lg:text-7xl font-extrabold mb-5 sm:mb-6 leading-[1.1] tracking-tight text-gray-900 dark:text-white">
                Учёба в радость, <br>
                <span class="text-gradient">а не в тягость</span>
            </h1>

            <p class="text-gray-600 dark:text-gray-300 text-base sm:text-lg md:text-xl mb-8 sm:mb-10 leading-relaxed max-w-xl">
                Семейная школа «Наследие» — это место, где дети хотят учиться. Индивидуальный подход,
                отсутствие стрессовых тестов и освобожденное время для спорта и творчества.
            </p>

            <div class="flex flex-col xs:flex-row gap-3 sm:gap-4">
                <a href="#contacts" data-track-cta="Оставить заявку"
                   class="text-center w-full xs:w-auto btn-primary px-6 sm:px-8 py-3.5 sm:py-4 text-base sm:text-lg">
                    Оставить заявку
                </a>
                <button type="button" data-track-cta="Узнать стоимость"
                        class="w-full xs:w-auto btn-secondary px-6 sm:px-8 py-3.5 sm:py-4 text-base sm:text-lg backdrop-blur-sm">
                    Узнать стоимость
                </button>
            </div>
        </div>

        <div class="relative hidden lg:block h-[500px] xl:h-[600px]">
            <img src="https://placehold.co/500x600/f3e8ff/6b21a8?text=Учеба"
                 class="absolute right-0 top-0 w-4/5 h-4/5 object-cover rounded-3xl shadow-2xl z-10

                 alt="Учеба" loading="lazy">
            <img src="https://placehold.co/400x300/dbeafe/1e40af?text=Спорт"
                 class="absolute left-0 bottom-10 w-3/5 h-2/5 object-cover rounded-3xl shadow-xl z-20
                        border-4 border-white dark:border-darkbg dark:shadow-[0_0_40px_rgba(0,0,0,0.8)]"
                 alt="Спорт" loading="lazy">
