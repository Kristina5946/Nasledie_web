<section id="benefits" class="py-16 sm:py-20 relative z-10 section-surface
    bg-white border-y border-gray-100
    dark:border-purple-400/10">
    <div class="section-container">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-10 sm:mb-16 gap-4 sm:gap-6">
            <div class="max-w-2xl">
                <h2 class="text-2xl sm:text-3xl md:text-4xl font-bold mb-3 sm:mb-4 text-gray-900 dark:text-white">
                    Почему родители выбирают <span class="text-purple-600 dark:text-purple-400">Наследие</span>
                </h2>
                <p class="text-gray-600 dark:text-gray-400 text-base sm:text-lg">
                    Наш подход в корне меняет отношение ребенка к образовательному процессу,
                    делая его комфортным и эффективным.
                </p>
            </div>
        </div>

        <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-5 sm:gap-8">
            {% for benefit in benefits %}
            <div class="card-surface p-6 sm:p-8 hover-card group">
                <div class="flex items-center gap-3 sm:gap-4 mb-4 sm:mb-6">
                    <div class="w-12 h-12 sm:w-14 sm:h-14 rounded-2xl flex items-center justify-center shrink-0 transition-colors
                        {% if benefit.color == 'purple' %}
                        bg-white border border-purple-100 text-purple-600 shadow-sm group-hover:bg-purple-50
                        dark:bg-purple-500/10 dark:border-purple-500/30 dark:text-purple-400 dark:group-hover:bg-purple-500/20 dark:shadow-none
                        {% elif benefit.color == 'blue' %}
                        bg-white border border-blue-100 text-blue-600 shadow-sm group-hover:bg-blue-50
                        dark:bg-blue-500/10 dark:border-blue-500/30 dark:text-blue-400 dark:group-hover:bg-blue-500/20 dark:shadow-none
                        {% else %}
                        bg-white border border-fuchsia-100 text-fuchsia-600 shadow-sm group-hover:bg-fuchsia-50
                        dark:bg-fuchsia-500/10 dark:border-fuchsia-500/30 dark:text-fuchsia-400 dark:group-hover:bg-fuchsia-500/20 dark:shadow-none
                        {% endif %}">
                        <span class="text-xl sm:text-2xl">{{ benefit.icon }}</span>
                    </div>
                    <h3 class="text-lg sm:text-xl font-bold text-gray-900 dark:text-white leading-tight">{{ benefit.title }}</h3>
                </div>
                <p class="text-gray-600 dark:text-gray-400 text-sm sm:text-base">{{ benefit.description }}</p>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
