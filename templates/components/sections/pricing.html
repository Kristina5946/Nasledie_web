<section id="pricing" class="py-16 sm:py-20 lg:py-24 relative z-10 overflow-hidden
    bg-gray-900 text-white dark:bg-darkbg-elevated dark:border-y dark:border-purple-400/10">
    <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-purple-600/15 rounded-full blur-[120px] -translate-y-1/2 translate-x-1/3 pointer-events-none
                dark:left-0 dark:right-auto dark:-translate-x-1/3"></div>

    <div class="section-container relative z-10">
        <div class="text-center mb-8 sm:mb-12">
            <p class="text-purple-400 text-sm font-semibold uppercase tracking-wider mb-3">Стоимость обучения</p>
            <h2 class="text-2xl sm:text-3xl md:text-4xl font-bold mb-6 text-white">
                Стоимость обучения
            </h2>

            <div class="inline-flex flex-wrap justify-center gap-2 p-1.5 rounded-2xl bg-white/5 border border-white/10 backdrop-blur-sm" id="pricing-filter">
                <button type="button" data-tier="1-4" class="pricing-filter__btn is-active">1–4 классы</button>
                <button type="button" data-tier="5-9" class="pricing-filter__btn">5–9 классы</button>
            </div>
            <p class="mt-4 text-purple-300/80 text-sm sm:text-base" id="pricing-tier-label">1–4 классы</p>
        </div>

        <div class="grid grid-cols-1 xs:grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-5" id="pricing-cards"></div>

        <p class="mt-8 sm:mt-10 text-center text-xs sm:text-sm text-gray-400 max-w-3xl mx-auto leading-relaxed px-2" id="pricing-note"></p>
    </div>

    <script type="application/json" id="pricing-data">{{ pricing_tiers_json|safe }}</script>
</section>
